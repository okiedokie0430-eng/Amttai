name: amttai
description: "Mongolian Recipe & Tutorial App — Premium cooking recipes in Mongolian."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  # Design
  cupertino_icons: ^1.0.8

  # State Management
  provider: ^6.1.2

  # Navigation
  go_router: ^14.6.2

  # Backend — Appwrite
  appwrite: ^14.0.0
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.5
  flutter_local_notifications: ^17.2.3

  # Networking
  dio: ^5.7.0
  connectivity_plus: ^6.1.0

  # Local persistence
  shared_preferences: ^2.3.4
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.5

  # Media
  cached_network_image: ^3.4.1
  flutter_cache_manager: ^3.4.1
  video_player: ^2.9.2
  chewie: ^1.8.5
  image_picker: ^1.1.2

  # Animation & UI helpers
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0

  # Utilities
  flutter_rating_bar: ^4.0.1
  intl: ^0.19.0
  url_launcher: ^6.3.1
  uuid: ^4.5.1
  permission_handler: ^11.3.1
  lottie: ^3.3.3
  flutter_svg: ^2.2.0
  in_app_purchase: ^3.2.3
  custom_refresh_indicator: ^4.0.1
  flutter_tts: ^4.2.5
  audioplayers: ^6.6.0
  http: ^1.6.0
  soft_edge_blur: ^0.1.3

dependency_overrides:
  flutter_web_auth_2: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.8

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/Montserrat-OFL.txt
  fonts:
    - family: Montserrat
      fonts:
        - asset: assets/fonts/Montserrat-Regular.ttf
          weight: 400
        - asset: assets/fonts/Montserrat-Medium.ttf
          weight: 500
        - asset: assets/fonts/Montserrat-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Montserrat-Bold.ttf
          weight: 700
        - asset: assets/fonts/Montserrat-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Montserrat-Black.ttf
          weight: 900
