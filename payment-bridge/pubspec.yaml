name: payment_bridge
description: "Amttai Payment Bridge — Standalone SMS payment automation daemon"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  # Minimal UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1

  # State (lightweight)
  flutter_riverpod: ^2.6.1

  # Local database
  path: ^1.9.1

  # Secure storage

  # Background
  workmanager: 0.9.0

  # Networking
  dio: ^5.7.0

  # Crypto
  crypto: ^3.0.6
  convert: ^3.1.2

  # Utilities
  uuid: ^4.5.1
  intl: ^0.19.0
  permission_handler: ^11.3.1
  device_info_plus: ^11.2.0
  connectivity_plus: ^6.1.0
  share_plus: ^10.1.4
  sqlite3_flutter_libs: ^0.6.0+eol
  flutter_secure_storage: ^10.0.0
  sqflite: ^2.4.2+1
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
